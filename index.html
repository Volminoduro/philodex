<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Philodex</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

/* ══════════════════════════════════════════════════════════════════
   DESIGN TOKENS
   ══════════════════════════════════════════════════════════════════ */
:root {
  /* Shell colors */
  --shell-red:    #cc2200;
  --shell-red-hi: #ff5533;
  --shell-red-lo: #881100;
  --shell-darkest:#440000;

  /* App background */
  --bg:           #0d0d1a;
  --bg-mid:       #131325;
  --bg-card:      #0e1428;
  --bg-card-alt:  #060e1e;

  /* LCD screens */
  --lcd-green-bg: #c8d8a0;
  --lcd-green-hi: #d8e8b0;
  --lcd-green-px: #8a9a60;
  --lcd-green-txt:#1a2800;
  --lcd-blue-bg:  #001030;
  --lcd-blue-mid: #001848;
  --lcd-blue-hi:  #002878;

  /* Text */
  --txt-bright:   #e8e4d8;
  --txt-mid:      #9090a8;
  --txt-dim:      #454560;
  --txt-gold:     #f0c840;
  --txt-red:      #ff5533;

  /* Accent */
  --accent:       #2050cc;
  --accent-hi:    #4070ff;

  /* Font stacks */
  --font-pixel:   'Press Start 2P', monospace;
  --font-mono:    'Courier New', 'Consolas', monospace;
  --font-ui:      system-ui, -apple-system, sans-serif;

  /* Sizes — desktop base */
  --fs-xxs:  9px;
  --fs-xs:  11px;
  --fs-sm:  13px;
  --fs-md:  15px;
  --fs-lg:  18px;
  --fs-xl:  22px;
  --fs-2xl: 28px;

  --radius: 6px;
  --gap:    16px;
}

/* ══ RESET ══ */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; overflow:hidden; }

body {
  background: var(--bg);
  color: var(--txt-bright);
  font-family: var(--font-mono);
  font-size: var(--fs-sm);
  line-height: 1.6;
}

/* ══ SCROLLBAR ══ */
::-webkit-scrollbar { width:5px; }
::-webkit-scrollbar-track { background:var(--lcd-blue-bg); }
::-webkit-scrollbar-thumb { background:var(--accent); border-radius:2px; }

/* ══════════════════════════════════════════════════════════════════
   DESKTOP LAYOUT  (≥ 1024px)
   Three-column fixed-height: sidebar | list | detail
   ══════════════════════════════════════════════════════════════════ */
#app-desktop {
  display: none;
  height: 100vh;
  flex-direction: column;
}

/* Top header bar */
.desk-header {
  flex-shrink: 0;
  background: var(--shell-red);
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 10px 20px;
  box-shadow: 0 3px 0 var(--shell-darkest), inset 0 1px 0 var(--shell-red-hi);
}

.desk-header .light-big {
  width: 24px; height: 24px;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, #aaeeff, #0088cc);
  border: 3px solid #005588;
  box-shadow: 0 0 0 3px #003355;
  flex-shrink: 0;
}

.desk-header .lights-sm { display:flex; gap:5px; }
.desk-header .dot {
  width:8px; height:8px; border-radius:50%;
  border: 1.5px solid rgba(0,0,0,.35);
}
.desk-header .dot.r { background:#ff5555; }
.desk-header .dot.y { background:#ffcc00; }
.desk-header .dot.g { background:#44dd44; }

.desk-header .title {
  font-family: var(--font-pixel);
  font-size: 13px;
  color: #ffddcc;
  letter-spacing: .15em;
  text-shadow: 1px 1px 0 var(--shell-darkest);
  margin-right: auto;
}

.desk-header .version {
  font-family: var(--font-pixel);
  font-size: 7px;
  color: #cc8866;
  letter-spacing: .1em;
}

.lang-btn {
  font-family: var(--font-pixel);
  font-size: 8px;
  color: var(--txt-gold);
  background: var(--shell-red-lo);
  border: 1.5px solid var(--txt-gold);
  padding: 5px 9px;
  cursor: pointer;
  letter-spacing: .1em;
  transition: background .15s, color .15s;
}
.lang-btn:hover { background: var(--txt-gold); color: #000; }

/* Main content area */
.desk-body {
  flex: 1;
  display: grid;
  grid-template-columns: 280px 1fr 1fr;
  overflow: hidden;
  gap: 0;
}

/* ── Sidebar ── */
.desk-sidebar {
  background: var(--bg-mid);
  border-right: 1px solid #1a1a30;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.sidebar-header {
  flex-shrink: 0;
  padding: 14px 16px 10px;
  border-bottom: 1px solid #1a1a30;
}

.sidebar-header h2 {
  font-family: var(--font-pixel);
  font-size: 7px;
  color: var(--txt-gold);
  letter-spacing: .12em;
  margin-bottom: 10px;
}

.search-box {
  width: 100%;
  background: var(--bg-card);
  border: 1px solid #1e2a4a;
  border-radius: var(--radius);
  color: var(--txt-bright);
  font-family: var(--font-mono);
  font-size: var(--fs-xs);
  padding: 8px 12px;
  outline: none;
  transition: border-color .15s;
}
.search-box::placeholder { color: var(--txt-dim); }
.search-box:focus { border-color: var(--accent); }

.filter-section {
  flex-shrink: 0;
  padding: 10px 16px;
  border-bottom: 1px solid #1a1a30;
  display: flex;
  flex-direction: column;
  gap: 7px;
}

.filter-field-row {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
}

.field-label {
  font-family: var(--font-pixel);
  font-size: 5px;
  color: var(--txt-dim);
  letter-spacing: .06em;
  min-width: 58px;
  flex-shrink: 0;
}

.chip {
  font-family: var(--font-pixel);
  font-size: 5px;
  padding: 3px 6px;
  border: 1px solid;
  cursor: pointer;
  letter-spacing: .05em;
  border-radius: 2px;
  opacity: .5;
  transition: opacity .15s, background .15s;
  white-space: nowrap;
}
.chip.active, .chip:hover { opacity: 1; }
.chip.active { background: rgba(255,255,255,.08); }

.sidebar-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px 0;
}

/* Philosopher row in sidebar */
.philo-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 16px;
  cursor: pointer;
  border-left: 3px solid transparent;
  transition: background .1s, border-color .1s;
}
.philo-row:hover { background: rgba(255,255,255,.04); }
.philo-row.active {
  background: rgba(32,80,204,.15);
  border-left-color: var(--accent-hi);
}

.philo-thumb {
  width: 40px; height: 40px;
  flex-shrink: 0;
  image-rendering: pixelated;
  background: var(--lcd-blue-mid);
  border: 1px solid var(--lcd-blue-hi);
  display: flex; align-items: center; justify-content: center;
}
.philo-thumb canvas { image-rendering: pixelated; image-rendering: crisp-edges; }

.philo-info { flex:1; min-width:0; }
.philo-num  { font-size: var(--fs-xxs); color: var(--txt-dim); letter-spacing:.06em; }
.philo-name { font-family: var(--font-pixel); font-size: 8px; color: var(--txt-bright); letter-spacing:.06em; margin: 3px 0; }
.philo-types { display:flex; gap:3px; flex-wrap:wrap; }
.type-badge {
  font-family: var(--font-pixel);
  font-size: 4px;
  padding: 2px 4px;
  border: 1px solid;
  border-radius: 2px;
  letter-spacing: .04em;
}

.philo-gen { font-size: var(--fs-xxs); color: var(--txt-dim); flex-shrink:0; }

/* ── Center column: list grid ── */
.desk-center {
  background: var(--bg);
  border-right: 1px solid #1a1a30;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.center-header {
  flex-shrink: 0;
  padding: 14px 20px 10px;
  border-bottom: 1px solid #1a1a30;
  display: flex;
  align-items: baseline;
  gap: 10px;
}
.center-header h2 {
  font-family: var(--font-pixel);
  font-size: 7px;
  color: var(--txt-mid);
  letter-spacing: .1em;
}
.count-badge {
  font-family: var(--font-pixel);
  font-size: 6px;
  color: var(--accent-hi);
  background: rgba(32,80,204,.2);
  padding: 2px 6px;
  border-radius: 2px;
  border: 1px solid rgba(64,112,255,.3);
}

.card-grid {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 12px;
  align-content: start;
}

/* Philosopher card */
.philo-card {
  background: var(--bg-card);
  border: 1px solid #1a2040;
  border-radius: var(--radius);
  cursor: pointer;
  transition: border-color .15s, transform .1s, box-shadow .15s;
  overflow: hidden;
}
.philo-card:hover {
  border-color: var(--accent);
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(32,80,204,.25);
}
.philo-card.active {
  border-color: var(--txt-gold);
  box-shadow: 0 0 0 1px var(--txt-gold);
}

.card-sprite-area {
  background: var(--lcd-green-bg);
  height: 110px;
  display: flex;
  align-items: center;
  justify-content: center;
  image-rendering: pixelated;
  position: relative;
  overflow: hidden;
}
/* Scanline texture */
.card-sprite-area::after {
  content:'';
  position:absolute; inset:0;
  background: repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.06) 2px,rgba(0,0,0,.06) 3px);
  pointer-events:none;
}
.card-sprite-area canvas { image-rendering:pixelated; image-rendering:crisp-edges; }

.card-body { padding: 10px 12px; }

.card-num  { font-size: var(--fs-xxs); color: var(--txt-dim); letter-spacing:.06em; }
.card-name {
  font-family: var(--font-pixel);
  font-size: 8px;
  color: var(--txt-bright);
  letter-spacing: .06em;
  margin: 4px 0 6px;
}
.card-types { display:flex; gap:3px; flex-wrap:wrap; margin-bottom:6px; }
.card-gen { font-size: var(--fs-xxs); color: var(--txt-dim); }

/* Influence mini-bar */
.card-infl {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-top: 6px;
}
.card-infl-label { font-size: var(--fs-xxs); color: var(--txt-dim); white-space:nowrap; }
.card-infl-bar {
  flex: 1;
  height: 4px;
  background: var(--lcd-blue-hi);
  border-radius: 2px;
  overflow: hidden;
}
.card-infl-fill { height:100%; border-radius:2px; transition:width .4s; }

/* ── Right column: detail panel ── */
.desk-detail {
  background: var(--bg-mid);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.detail-empty {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  color: var(--txt-dim);
}
.detail-empty .arrow {
  font-family: var(--font-pixel);
  font-size: 24px;
  color: #2a2a45;
  animation: pulse 2s ease-in-out infinite;
}
.detail-empty p {
  font-family: var(--font-pixel);
  font-size: 7px;
  letter-spacing: .1em;
  text-align: center;
  line-height: 2.5;
}
@keyframes pulse { 0%,100%{opacity:.3} 50%{opacity:.8} }

/* Detail content */
.detail-content { display:none; flex-direction:column; height:100%; overflow:hidden; }
.detail-content.visible { display:flex; }

/* Detail top: sprite left + meta right */
.detail-top {
  flex-shrink: 0;
  display: grid;
  grid-template-columns: 200px 1fr;
  border-bottom: 1px solid #1a1a30;
}

.detail-sprite-panel {
  background: var(--lcd-green-bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 16px;
  gap: 8px;
  position: relative;
  overflow: hidden;
  border-right: 1px solid #1a1a30;
  min-height: 220px;
}
.detail-sprite-panel::after {
  content:'';
  position:absolute; inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.06) 2px,rgba(0,0,0,.06) 3px);
  pointer-events:none;
}
.detail-sprite-panel canvas { image-rendering:pixelated; image-rendering:crisp-edges; }

.sprite-num  { font-family:var(--font-pixel); font-size:6px; color:var(--lcd-green-txt); letter-spacing:.06em; }
.sprite-name { font-family:var(--font-pixel); font-size:8px; color:var(--lcd-green-txt); letter-spacing:.08em; }

.infl-row { display:flex; align-items:center; gap:6px; width:100%; }
.infl-lbl { font-family:var(--font-pixel); font-size:5px; color:var(--lcd-green-txt); }
.infl-bar { flex:1; height:5px; background:#8a9a60; border:1px solid #4a5a20; border-radius:2px; overflow:hidden; }
.infl-fill { height:100%; border-radius:2px; transition:width .4s; }
.infl-fill.hi  { background:#44aa00; }
.infl-fill.mid { background:#eeaa00; }
.infl-fill.low { background:#ee2200; }

.sprite-types { display:flex; gap:4px; flex-wrap:wrap; justify-content:center; }

.detail-meta {
  padding: 16px 18px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  background: var(--lcd-blue-bg);
}
.meta-full   { font-size:var(--fs-lg); font-weight:bold; color:var(--txt-bright); letter-spacing:.02em; }
.meta-dates  { font-size:var(--fs-xs); color:var(--txt-mid); }
.meta-lieu   { font-size:var(--fs-xs); color:var(--txt-dim); }
.meta-oeuvre { font-size:var(--fs-xs); color:var(--txt-gold); margin-top:4px; }

.meta-gen-badge {
  display: inline-block;
  font-family: var(--font-pixel);
  font-size: 6px;
  padding: 3px 7px;
  border: 1px solid;
  border-radius: 2px;
  letter-spacing: .06em;
  align-self: flex-start;
}

/* Detail tabs area */
.detail-tabs-bar {
  flex-shrink: 0;
  display: flex;
  background: var(--bg-card-alt);
  border-bottom: 1px solid #1a1a30;
  overflow-x: auto;
}
.detail-tabs-bar::-webkit-scrollbar { height: 0; }

.dtab {
  font-family: var(--font-pixel);
  font-size: 6px;
  padding: 12px 14px;
  color: var(--txt-dim);
  border: none;
  background: none;
  cursor: pointer;
  letter-spacing: .08em;
  white-space: nowrap;
  border-bottom: 2px solid transparent;
  transition: color .15s, border-color .15s;
}
.dtab:hover { color: var(--txt-mid); }
.dtab.active { color: var(--txt-gold); border-bottom-color: var(--txt-gold); }

.detail-tab-body {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
}

/* ══════════════════════════════════════════════════════════════════
   MOBILE LAYOUT  (< 1024px)
   ══════════════════════════════════════════════════════════════════ */
#app-mobile {
  display: none;
  height: 100vh;
  flex-direction: column;
  overflow: hidden;
}

/* Mobile header */
.mob-header {
  flex-shrink: 0;
  background: var(--shell-red);
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  box-shadow: 0 2px 0 var(--shell-darkest), inset 0 1px 0 var(--shell-red-hi);
}
.mob-header .title {
  font-family: var(--font-pixel);
  font-size: 10px;
  color: #ffddcc;
  letter-spacing: .12em;
  text-shadow: 1px 1px 0 var(--shell-darkest);
  margin-right: auto;
}

/* Mobile search strip */
.mob-search-strip {
  flex-shrink: 0;
  padding: 10px 12px;
  background: var(--bg-mid);
  border-bottom: 1px solid #1a1a30;
  display: flex;
  gap: 8px;
}
.mob-search-box {
  flex: 1;
  background: var(--bg-card);
  border: 1px solid #1e2a4a;
  border-radius: var(--radius);
  color: var(--txt-bright);
  font-family: var(--font-mono);
  font-size: var(--fs-sm);
  padding: 9px 12px;
  outline: none;
}
.mob-search-box::placeholder { color: var(--txt-dim); }
.mob-search-box:focus { border-color: var(--accent); }

/* Mobile type filter strip */
.mob-filter-strip {
  flex-shrink: 0;
  padding: 8px 12px;
  background: var(--bg-mid);
  border-bottom: 1px solid #1a1a30;
  display: flex;
  gap: 6px;
  overflow-x: auto;
}
.mob-filter-strip::-webkit-scrollbar { height:0; }

/* Mobile list */
.mob-list {
  flex: 1;
  overflow-y: auto;
  padding: 0;
}

.mob-philo-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 14px;
  border-bottom: 1px solid #1a1a30;
  cursor: pointer;
  transition: background .1s;
}
.mob-philo-row:active { background: rgba(32,80,204,.12); }

.mob-thumb {
  width: 52px; height: 52px;
  flex-shrink: 0;
  background: var(--lcd-green-bg);
  display: flex; align-items:center; justify-content:center;
  image-rendering:pixelated;
}
.mob-thumb canvas { image-rendering:pixelated; image-rendering:crisp-edges; }

.mob-info { flex:1; min-width:0; }
.mob-num  { font-size:var(--fs-xxs); color:var(--txt-dim); }
.mob-name {
  font-family: var(--font-pixel);
  font-size: 10px;
  color: var(--txt-bright);
  margin: 3px 0 5px;
  letter-spacing: .05em;
}
.mob-types { display:flex; gap:4px; flex-wrap:wrap; }

.mob-infl-label { font-size:var(--fs-xxs); color:var(--txt-dim); flex-shrink:0; }

/* Mobile detail overlay */
.mob-detail {
  display: none;
  position: fixed;
  inset: 0;
  background: var(--bg);
  z-index: 200;
  flex-direction: column;
  overflow: hidden;
}
.mob-detail.open { display:flex; }

.mob-detail-header {
  flex-shrink: 0;
  background: var(--shell-red);
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 14px;
  box-shadow: 0 2px 0 var(--shell-darkest);
}
.mob-back-btn {
  font-family: var(--font-pixel);
  font-size: 7px;
  color: #ffddcc;
  background: none;
  border: 1.5px solid #ffddcc66;
  padding: 5px 9px;
  cursor: pointer;
  letter-spacing: .06em;
}
.mob-detail-title {
  font-family: var(--font-pixel);
  font-size: 9px;
  color: #ffddcc;
  letter-spacing: .1em;
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* Mobile detail hero */
.mob-detail-hero {
  flex-shrink: 0;
  display: grid;
  grid-template-columns: 160px 1fr;
  border-bottom: 1px solid #1a1a30;
}
.mob-hero-sprite {
  background: var(--lcd-green-bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 12px;
  gap: 6px;
  min-height: 160px;
  position: relative;
  overflow: hidden;
}
.mob-hero-sprite::after {
  content:'';
  position:absolute; inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.07) 2px,rgba(0,0,0,.07) 3px);
  pointer-events:none;
}
.mob-hero-sprite canvas { image-rendering:pixelated; image-rendering:crisp-edges; }

.mob-hero-meta {
  padding: 12px;
  background: var(--lcd-blue-bg);
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.mob-meta-full  { font-size:var(--fs-md); font-weight:bold; color:var(--txt-bright); }
.mob-meta-dates { font-size:var(--fs-xs); color:var(--txt-mid); }
.mob-meta-oeuvre{ font-size:var(--fs-xs); color:var(--txt-gold); }

/* Mobile tabs — scrollable strip */
.mob-tab-strip {
  flex-shrink: 0;
  display: flex;
  background: var(--bg-card-alt);
  border-bottom: 1px solid #1a1a30;
  overflow-x: auto;
}
.mob-tab-strip::-webkit-scrollbar { height:0; }

.mob-tab-btn {
  font-family: var(--font-pixel);
  font-size: 6px;
  padding: 12px 14px;
  color: var(--txt-dim);
  border: none;
  background: none;
  cursor: pointer;
  letter-spacing: .07em;
  white-space: nowrap;
  border-bottom: 2px solid transparent;
  flex-shrink: 0;
  transition: color .15s, border-color .15s;
}
.mob-tab-btn.active { color:var(--txt-gold); border-bottom-color:var(--txt-gold); }

.mob-tab-body {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
}

/* ══════════════════════════════════════════════════════════════════
   SHARED DETAIL CONTENT STYLES
   (used in both desktop .detail-tab-body and mobile .mob-tab-body)
   ══════════════════════════════════════════════════════════════════ */

/* Entry text */
.entry-text {
  font-size: var(--fs-sm);
  color: var(--txt-mid);
  line-height: 1.9;
  letter-spacing: .02em;
  max-width: 60ch;
}

/* Stats */
.stat-list { display:flex; flex-direction:column; gap:10px; }
.stat-row { display:flex; align-items:center; gap:10px; }
.stat-key {
  font-family: var(--font-pixel);
  font-size: 7px;
  color: #7799cc;
  width: 100px;
  flex-shrink: 0;
  letter-spacing: .04em;
}

// ══════════════════════════════════════════════════════════════════════════════
// PIXEL ART ENGINE
// ══════════════════════════════════════════════════════════════════════════════
// Wikimedia Commons API — CORS-enabled via ?origin=* (no proxy needed).
// The API returns a thumbnail URL which is then loaded directly into a canvas.
const WIKIMEDIA_API = 'https://commons.wikimedia.org/w/api.php';

/**
 * Resolves a Wikimedia Commons file URL to a CORS-accessible thumbnail URL.
 * Uses the MediaWiki action API with origin=* which Wikimedia explicitly supports.
 * @param {string} fileUrl - Full commons upload URL
 * @param {number} width   - Requested thumbnail width in pixels
 * @returns {Promise<string|null>} - Thumb URL, or null on failure
 */
async function resolveWikimediaThumb(fileUrl, width = 300) {
  // Extract the filename from the URL (last path segment, URL-decoded)
  const filename = decodeURIComponent(fileUrl.split('/').pop());
  const title = 'File:' + filename;
  const apiUrl = `${WIKIMEDIA_API}?action=query&titles=${encodeURIComponent(title)}&prop=imageinfo&iiprop=url&iiurlwidth=${width}&format=json&origin=*`;
  try {
    const res = await fetch(apiUrl);
    const json = await res.json();
    const pages = json.query.pages;
    const page = Object.values(pages)[0];
    return page?.imageinfo?.[0]?.thumburl || null;
  } catch {
    return null;
  }
}
const GB_PALETTE  = [[15,56,15],[48,98,48],[139,172,15],[155,188,15]];
const GBC_PALETTE = [[8,24,32],[52,104,86],[136,192,112],[224,248,208],[200,76,28],[248,176,104],[168,56,16],[104,32,8],[64,64,64],[144,144,144],[216,216,216],[248,248,248],[32,56,144],[120,168,248],[56,144,200],[200,232,248]];

function nearestColor(r,g,b,pal){let bi=0,bd=1e9;pal.forEach(([pr,pg,pb],i)=>{const d=(r-pr)**2+(g-pg)**2+(b-pb)**2;if(d<bd){bd=d;bi=i;}});return pal[bi];}

function medianCut(pixels,depth=5){
  if(!pixels.length)return[[128,128,128]];let buckets=[pixels];
  for(let d=0;d<depth;d++){const next=[];buckets.forEach(b=>{if(b.length<2){next.push(b);return;}let rn=255,rx=0,gn=255,gx=0,bn=255,bx=0;b.forEach(([r,g,bv])=>{rn=Math.min(rn,r);rx=Math.max(rx,r);gn=Math.min(gn,g);gx=Math.max(gx,g);bn=Math.min(bn,bv);bx=Math.max(bx,bv);});const ax=(rx-rn)>=(gx-gn)&&(rx-rn)>=(bx-bn)?0:(gx-gn)>=(bx-bn)?1:2;b.sort((a,bv)=>a[ax]-bv[ax]);const m=Math.floor(b.length/2);next.push(b.slice(0,m),b.slice(m));});buckets=next;}
  return buckets.map(b=>{if(!b.length)return[128,128,128];const s=b.reduce((a,c)=>[a[0]+c[0],a[1]+c[1],a[2]+c[2]],[0,0,0]);return s.map(v=>Math.round(v/b.length));});
}

function floydSteinberg(data,w,h,pal){
  const err=new Float32Array(w*h*3),out=new Uint8ClampedArray(w*h*4);
  for(let y=0;y<h;y++)for(let x=0;x<w;x++){const i=(y*w+x)*4,ei=(y*w+x)*3;const r=Math.max(0,Math.min(255,data[i]+err[ei])),g=Math.max(0,Math.min(255,data[i+1]+err[ei+1])),bv=Math.max(0,Math.min(255,data[i+2]+err[ei+2]));const[nr,ng,nb]=nearestColor(r,g,bv,pal);out[i]=nr;out[i+1]=ng;out[i+2]=nb;out[i+3]=255;const er=r-nr,eg=g-ng,eb=bv-nb;const add=(dx,dy,f)=>{const nx=x+dx,ny=y+dy;if(nx>=0&&nx<w&&ny<h){const e2=(ny*w+nx)*3;err[e2]+=er*f;err[e2+1]+=eg*f;err[e2+2]+=eb*f;}};add(1,0,7/16);add(-1,1,3/16);add(0,1,5/16);add(1,1,1/16);}
  return out;
}

/**
 * Fetches a philosopher portrait via the Wikimedia Commons API (no proxy),
 * then applies generation-appropriate pixelization and dithering.
 * @param {string} url - Original Wikimedia commons upload URL
 * @param {number} gen - Generation (1=Game Boy, 2=GBC, 3=GBA)
 * @returns {Promise<HTMLCanvasElement|null>}
 */
async function pixelizeImage(url, gen) {
  const SZ = gen === 3 ? 64 : 56, SC = 2;
  // Request a thumbnail sized for pixelization (2× the target canvas size)
  const thumbUrl = await resolveWikimediaThumb(url, SZ * 2);
  if (!thumbUrl) return null;

  return new Promise(resolve => {
    const tmp = document.createElement('canvas'); tmp.width = SZ; tmp.height = SZ;
    const ctx = tmp.getContext('2d');
    const img = new Image(); img.crossOrigin = 'anonymous';
    img.onload = () => {
      const s = Math.min(img.width, img.height);
      ctx.drawImage(img, (img.width-s)/2, (img.height-s)/2, s, s, 0, 0, SZ, SZ);
      const raw = ctx.getImageData(0, 0, SZ, SZ); let pal;
      if (gen === 1) {
        pal = GB_PALETTE;
        // Desaturate to grayscale before applying the 4-shade GB palette
        for (let i = 0; i < raw.data.length; i += 4) {
          const gr = Math.round(raw.data[i]*.299 + raw.data[i+1]*.587 + raw.data[i+2]*.114);
          raw.data[i] = raw.data[i+1] = raw.data[i+2] = gr;
        }
      } else if (gen === 2) {
        pal = GBC_PALETTE;
      } else {
        // Gen 3: derive a custom 32-color palette from the image via median cut
        const px = [];
        for (let i = 0; i < raw.data.length; i += 4)
          if (raw.data[i+3] > 128) px.push([raw.data[i], raw.data[i+1], raw.data[i+2]]);
        pal = medianCut(px, 5);
      }
      const dith = floydSteinberg(raw.data, SZ, SZ, pal);
      const out = document.createElement('canvas'); out.width = SZ*SC; out.height = SZ*SC;
      const oc = out.getContext('2d'); oc.imageSmoothingEnabled = false;
      for (let y = 0; y < SZ; y++)
        for (let x = 0; x < SZ; x++) {
          const i = (y*SZ+x)*4;
          oc.fillStyle = `rgb(${dith[i]},${dith[i+1]},${dith[i+2]})`;
          oc.fillRect(x*SC, y*SC, SC, SC);
        }
      // Gen 1: overlay a greenish LCD tint
      if (gen === 1) {
        oc.globalCompositeOperation = 'multiply';
        oc.fillStyle = 'rgba(155,188,15,.25)';
        oc.fillRect(0, 0, SZ*SC, SZ*SC);
        oc.globalCompositeOperation = 'source-over';
      }
      resolve(out);
    };
    img.onerror = () => resolve(null);
    img.src = thumbUrl;
  });
}

/** Placeholder canvas for when the image hasn't loaded yet. */
function placeholderCanvas(size){
  const c=document.createElement('canvas');c.width=size;c.height=size;
  const ctx=c.getContext('2d');ctx.fillStyle='#001848';ctx.fillRect(0,0,size,size);
  ctx.fillStyle='#334466';ctx.font=`${Math.floor(size*.22)}px monospace`;
  ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('???',size/2,size/2);
  return c;
}

// Sprite cache: key = `${id}_${size}`
const spriteCache={};

async function getSprite(p,size){
  const key=`${p.id}_${size}`;
  if(spriteCache[key])return spriteCache[key].cloneNode(true);
  const c=await pixelizeImage(p.imgUrl,p.gen);
  if(!c){const ph=placeholderCanvas(size);spriteCache[key]=ph;return ph.cloneNode(true);}
  const out=document.createElement('canvas');out.width=size;out.height=size;
  const ctx=out.getContext('2d');ctx.imageSmoothingEnabled=false;ctx.drawImage(c,0,0,size,size);
  spriteCache[key]=out;
  return out.cloneNode(true);
}

// ══════════════════════════════════════════════════════════════════════════════
// TYPE SYSTEM
// ══════════════════════════════════════════════════════════════════════════════
const CHAMPS={
  'ÉPISTÉM.':{color:'#5588ee',types:['Rationalisme','Empirisme','Scepticisme'],matchups:{'Rationalisme':{'Rationalisme':1,'Empirisme':.5,'Scepticisme':2},'Empirisme':{'Rationalisme':2,'Empirisme':1,'Scepticisme':.5},'Scepticisme':{'Rationalisme':.5,'Empirisme':2,'Scepticisme':1}}},

function normalize(s){return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/\s+/g,'');}
function tClass(tp){return 'tc-'+normalize(tp);}
function fillClass(tp){return 'fill-'+normalize(tp);}
function champOf(tp){for(const[c,d]of Object.entries(CHAMPS))if(d.types.includes(tp))return c;return null;}

/** Computes which attacking types hit harder (×2) or softer (×½) against these defense types. */
function computeDefMatchups(types){
  const r={fort:[],faible:[]};
  for(const[ch,cd]of Object.entries(CHAMPS))for(const at of cd.types){
    let m=1,has=false;
    for(const dt of types){if(champOf(dt)!==ch)continue;const v=cd.matchups?.[at]?.[dt];if(v!==undefined){m*=v;has=true;}}
    if(!has)continue;
    if(m>=2)r.fort.push({type:at});else if(m<=.5)r.faible.push({type:at});
  }
  return r;
}

// LAYOUT DETECTION
// ══════════════════════════════════════════════════════════════════════════════
const mq = window.matchMedia('(max-width: 1023px)');

/** Applies the correct layout class and re-renders both views. */
function applyLayout() {
  const isMobile = mq.matches;
  document.body.classList.toggle('is-desktop', !isMobile);
  document.body.classList.toggle('is-mobile',   isMobile);
  if (!isMobile) { buildDesktop(); }
  else           { buildMobile();  }
}

mq.addEventListener('change', applyLayout);

let activeType   = null;
let activeSearch = '';

function filteredList() {
  const q = activeSearch.toLowerCase();
  return PHILOMON.filter(p => {
    const d = p[lang];
    const mq2 = !q || p.nom.toLowerCase().includes(q) || p.full.toLowerCase().includes(q)
               || p.types.some(tp=>tp.toLowerCase().includes(q))
               || d.concepts.some(c=>c.nom.toLowerCase().includes(q));
    const mt = !activeType || p.types.includes(activeType);
    return mq2 && mt;
  });
}

/** Renders the Pokédex entry text tab. */
function buildEntryHtml(p) {
  const d = p[lang];
  return `<p class="entry-text">${d.entree}</p>`;
}

/** Renders the stats tab with colored bars. */
function buildStatsHtml(p) {
  return `<div class="stat-list">${
    Object.entries(p.stats).map(([k,v])=>`
      <div class="stat-row">
        <span class="stat-key">${k}</span>
        <span class="stat-val">${v}</span>
        <div class="stat-bar">
          <div class="stat-fill ${fillClass(p.types[0])}" style="width:${v}%"></div>
        </div>
      </div>`).join('')
  }</div>`;
}

/** Renders defensive matchups (resistances and weaknesses). */
function buildMatchupsHtml(p) {
  const dm = computeDefMatchups(p.types);
  const myChamps = [...new Set(p.types.map(champOf).filter(Boolean))];
  const other = Object.keys(CHAMPS).filter(c=>!myChamps.includes(c)).map(c=>I18N[lang].champLabels[c]||c);
  let html = '<div class="matchup-section">';
  if (dm.fort.length)  html += `<div><div class="matchup-group-title">${t('resistances')}</div><div class="pill-row">${dm.fort.map(e=>`<div class="pill strong"><span class="${tClass(e.type)}">${e.type.toUpperCase()}</span><span class="mult">×½</span></div>`).join('')}</div></div>`;
  if (dm.faible.length) html += `<div><div class="matchup-group-title">${t('weaknesses')}</div><div class="pill-row">${dm.faible.map(e=>`<div class="pill weak"><span class="${tClass(e.type)}">${e.type.toUpperCase()}</span><span class="mult">×2</span></div>`).join('')}</div></div>`;
  if (other.length) html += `<div class="incommensurable-note">${t('incommensurable')}${other.join(', ')}</div>`;
  return html + '</div>';
}

/** Renders the concepts (attacks) tab with offensive matchup hints. */
function buildConceptsHtml(p) {
  const d = p[lang];
  return `<div class="concept-list">${d.concepts.map((c,idx)=>{
    const cType = p.conceptTypes[idx];
    let vsRows = '';
    for(const[,cd] of Object.entries(CHAMPS)){
      if(champOf(cType) !== Object.keys(CHAMPS).find(k=>CHAMPS[k]===cd)) continue;
      for(const dt of cd.types){
        if(dt===cType)continue;
        const m=cd.matchups?.[cType]?.[dt];
        if(m&&m!==1)vsRows+=`<span class="vs-lbl">vs</span><span class="vs-pill ${tClass(dt)}">${dt.substring(0,6).toUpperCase()}</span><span class="vs-mult" style="color:${m>=2?'#44ff44':'#ff4444'}">${m>=2?'×2':'×½'}</span>`;
      }
    }
    return `<div class="concept-card">
      <div class="concept-top">
        <span class="concept-name">${c.nom}</span>
        <span class="concept-pwr">PWR ${c.puissance}</span>
      </div>
      <span class="concept-type-tag ${tClass(cType)}">${cType.toUpperCase()}</span>
      <div class="concept-desc">${c.desc}</div>
      ${vsRows?`<div class="concept-matchup-row">${vsRows}</div>`:''}
    </div>`;
  }).join('')}</div>`;
}

/** Renders the filiation (philosophical lineage) tab. */
function buildFiliationHtml(p) {
  const f = p[lang].filiation;
  return `<div class="fil-section">
    <div><div class="fil-group-title">${t('influences')}</div>
    <div class="fil-chain">${f.maitres.map(m=>`<span class="fil-tag">${m}</span>`).join('')}<span class="fil-arrow">▶</span><span class="fil-tag self">${p.nom}</span></div></div>
    <div><div class="fil-group-title">${t('disciples')}</div>
    <div class="fil-chain"><span class="fil-tag self">${p.nom}</span><span class="fil-arrow">▶</span>${f.disciples.map(d=>`<span class="fil-tag">${d}</span>`).join('')}</div></div>
    ${f.contre?.length?`<div><div class="fil-group-title" style="color:#cc4444">${t('oppositions')}</div><div class="fil-chain">${f.contre.map(c=>`<span class="fil-tag hostile">${c}</span>`).join('')}</div></div>`:''}
  </div>`;
}

/** Dispatches tab content to a container element. */
function renderTab(tabKey, p, container) {
  const builders = {
    entree: buildEntryHtml,
    stats: buildStatsHtml,
    matchups: buildMatchupsHtml,
    concepts: buildConceptsHtml,
    filiation: buildFiliationHtml,
  };
  container.innerHTML = (builders[tabKey]||buildEntryHtml)(p);
}

// ══════════════════════════════════════════════════════════════════════════════
// DESKTOP VIEW
// ══════════════════════════════════════════════════════════════════════════════
let selectedPhilo = null;
let activeDesktopTab = 'entree';

function buildDesktop() {
  buildDesktopFilters();
  renderDesktopList();
  applyDesktopLangLabels();
  if (selectedPhilo) openDesktopDetail(selectedPhilo);
}

function buildDesktopFilters() {
  const el = document.getElementById('desk-filters');
  el.innerHTML = '';
  for(const[champ,cd] of Object.entries(CHAMPS)){
    const row = document.createElement('div');
    row.className = 'filter-field-row';
    const lbl = document.createElement('span');
    lbl.className = 'field-label';
    lbl.style.color = cd.color+'bb';
    lbl.textContent = I18N[lang].champLabels[champ] || champ;
    row.appendChild(lbl);
    cd.types.forEach(tp => {
      const chip = document.createElement('div');
      chip.className = 'chip' + (activeType===tp?' active':'');
      chip.dataset.type = tp;
      chip.style.borderColor = cd.color;
      chip.style.color = cd.color;
      chip.textContent = tp.substring(0,5).toUpperCase();
      chip.addEventListener('click', () => {
        activeType = activeType===tp ? null : tp;
        buildDesktopFilters();
        renderDesktopList();
        if (selectedPhilo && !filteredList().includes(selectedPhilo)) {
          selectedPhilo = null;
          showDesktopEmpty();
        }
      });
      row.appendChild(chip);
    });
    el.appendChild(row);
  }
}

function renderDesktopList() {
  const items = filteredList();
  document.getElementById('desk-count').textContent = items.length;

  // Sidebar list
  const sidebar = document.getElementById('desk-sidebar-list');
  sidebar.innerHTML = '';
  items.forEach(p => {
    const row = document.createElement('div');
    row.className = 'philo-row' + (selectedPhilo===p ? ' active':'');
    const thumb = document.createElement('div'); thumb.className = 'philo-thumb';
    thumb.appendChild(placeholderCanvas(38));
    getSprite(p,38).then(c=>{thumb.innerHTML='';thumb.appendChild(c);});
    const info = document.createElement('div'); info.className = 'philo-info';
    info.innerHTML = `<div class="philo-num">#${p.id}</div>
      <div class="philo-name">${p.nom}</div>
      <div class="philo-types">${p.types.map(tp=>`<span class="type-badge ${tClass(tp)}">${tp.substring(0,5).toUpperCase()}</span>`).join('')}</div>`;
    const gen = document.createElement('div'); gen.className = 'philo-gen';
    gen.textContent = GEN_NAMES[p.gen]; gen.style.color = GEN_COLORS[p.gen];
    row.appendChild(thumb); row.appendChild(info); row.appendChild(gen);
    row.addEventListener('click', ()=>openDesktopDetail(p));
    sidebar.appendChild(row);
  });

  // Card grid
  const grid = document.getElementById('desk-card-grid');
  grid.innerHTML = '';
  items.forEach(p => {
    const card = document.createElement('div');
    card.className = 'philo-card' + (selectedPhilo===p ? ' active':'');
    const spriteArea = document.createElement('div'); spriteArea.className = 'card-sprite-area';
    spriteArea.appendChild(placeholderCanvas(88));
    getSprite(p,88).then(c=>{spriteArea.innerHTML='';spriteArea.appendChild(c);});
    card.innerHTML = '';
    card.appendChild(spriteArea);
    const body = document.createElement('div'); body.className = 'card-body';
    body.innerHTML = `<div class="card-num">#${p.id}</div>
      <div class="card-name">${p.nom}</div>
      <div class="card-types">${p.types.map(tp=>`<span class="type-badge ${tClass(tp)}">${tp.substring(0,5).toUpperCase()}</span>`).join('')}</div>
      <div class="card-gen" style="color:${GEN_COLORS[p.gen]}">${GEN_NAMES[p.gen]}</div>
      <div class="card-infl">
        <span class="card-infl-label">INFL</span>
        <div class="card-infl-bar"><div class="card-infl-fill ${fillClass(p.types[0])}" style="width:${p.stats.INFLUENCE}%"></div></div>
        <span class="card-infl-label">${p.stats.INFLUENCE}</span>
      </div>`;
    card.appendChild(body);
    card.addEventListener('click', ()=>openDesktopDetail(p));
    grid.appendChild(card);
  });
}

function showDesktopEmpty() {
  document.getElementById('desk-empty').style.display = 'flex';
  document.getElementById('desk-detail-content').classList.remove('visible');
}

function openDesktopDetail(p) {
  selectedPhilo = p;
  // Re-highlight active items
  document.querySelectorAll('.philo-row').forEach(r=>r.classList.remove('active'));
  document.querySelectorAll('.philo-card').forEach(r=>r.classList.remove('active'));
  const pIdx = PHILOMON.indexOf(p);

  document.getElementById('desk-empty').style.display = 'none';
  document.getElementById('desk-detail-content').classList.add('visible');

  // Sprite
  const spriteEl = document.getElementById('desk-d-sprite');
  spriteEl.innerHTML = '';
  spriteEl.appendChild(placeholderCanvas(120));
  getSprite(p,120).then(c=>{spriteEl.innerHTML='';spriteEl.appendChild(c);});

  // Meta
  document.getElementById('desk-d-num').textContent = '#'+p.id;
  document.getElementById('desk-d-name').textContent = p.nom;
  document.getElementById('desk-d-full').textContent = p.full;
  document.getElementById('desk-d-dates').textContent = p.dates;
  document.getElementById('desk-d-lieu').textContent = p.lieu;
  document.getElementById('desk-d-oeuvre').textContent = p[lang].oeuvre;
  const genBadge = document.getElementById('desk-d-gen');
  genBadge.textContent = GEN_NAMES[p.gen];
  genBadge.style.borderColor = GEN_COLORS[p.gen];
  genBadge.style.color = GEN_COLORS[p.gen];

  // Influence bar
  const inf = p.stats.INFLUENCE;
  document.getElementById('desk-d-infl-num').textContent = inf;
  const fill = document.getElementById('desk-d-infl');
  fill.style.width = inf+'%';
  fill.className = 'infl-fill '+(inf>=50?'hi':inf>=25?'mid':'low');

  // Types
  document.getElementById('desk-d-types').innerHTML =
    p.types.map(tp=>`<span class="type-badge ${tClass(tp)}">${tp.toUpperCase()}</span>`).join('');

  // Render active tab
  renderTab(activeDesktopTab, p, document.getElementById('desk-tab-body'));

  // Update active states in list/grid
  renderDesktopList();
}

// Desktop tab clicks
document.querySelectorAll('.dtab').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('.dtab').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    activeDesktopTab = btn.dataset.tab;
    if(selectedPhilo) renderTab(activeDesktopTab, selectedPhilo, document.getElementById('desk-tab-body'));
  });
});

// Desktop search
document.getElementById('desk-search').addEventListener('input', e=>{
  activeSearch = e.target.value;
  renderDesktopList();
});

// Desktop lang switch
document.getElementById('desk-lang').addEventListener('click', ()=>{
  lang = lang==='fr'?'en':'fr';
  applyDesktopLangLabels();
  buildDesktopFilters();
  renderDesktopList();
  if(selectedPhilo) openDesktopDetail(selectedPhilo);
});

function applyDesktopLangLabels() {
  document.getElementById('desk-lang').textContent    = lang==='fr'?'EN':'FR';
  document.getElementById('desk-list-title').textContent = t('listTitle');
  document.getElementById('desk-search').placeholder  = t('search');
  document.getElementById('desk-empty-txt').textContent = t('emptyState').replace('\n',' ');
  document.getElementById('desk-tab-entree').textContent   = t('tabEntry');
  document.getElementById('desk-tab-stats').textContent    = t('tabStats');
  document.getElementById('desk-tab-matchups').textContent = t('tabMatchups');
  document.getElementById('desk-tab-concepts').textContent = t('tabConcepts');
  document.getElementById('desk-tab-filiation').textContent= t('tabFiliation');
  document.documentElement.lang = lang;
}

// ══════════════════════════════════════════════════════════════════════════════
// MOBILE VIEW
// ══════════════════════════════════════════════════════════════════════════════
let activeMobileTab = 'entree';
let mobilePhilo = null;

function buildMobile() {
  buildMobileFilters();
  renderMobileList();
  applyMobileLangLabels();
}

function buildMobileFilters() {
  const el = document.getElementById('mob-filters');
  el.innerHTML = '';
  for(const[,cd] of Object.entries(CHAMPS)){
    cd.types.forEach(tp=>{
      const chip = document.createElement('div');
      chip.className = 'chip'+(activeType===tp?' active':'');
      chip.dataset.type = tp;
      chip.style.borderColor = cd.color; chip.style.color = cd.color;
      chip.textContent = tp.substring(0,6).toUpperCase();
      chip.style.fontSize = '10px';
      chip.style.padding = '5px 9px';
      chip.addEventListener('click',()=>{
        activeType = activeType===tp?null:tp;
        buildMobileFilters();
        renderMobileList();
      });
      el.appendChild(chip);
    });
  }
}

function renderMobileList() {
  const items = filteredList();
  const list = document.getElementById('mob-list');
  list.innerHTML = '';
  items.forEach(p=>{
    const row = document.createElement('div'); row.className = 'mob-philo-row';
    const thumb = document.createElement('div'); thumb.className = 'mob-thumb';
    thumb.appendChild(placeholderCanvas(48));
    getSprite(p,48).then(c=>{thumb.innerHTML='';thumb.appendChild(c);});
    const info = document.createElement('div'); info.className = 'mob-info';
    info.innerHTML = `<div class="mob-num">#${p.id}</div>
      <div class="mob-name">${p.nom}</div>
      <div class="mob-types">${p.types.map(tp=>`<span class="type-badge ${tClass(tp)}" style="font-size:9px;padding:3px 6px">${tp.substring(0,8).toUpperCase()}</span>`).join('')}</div>`;
    const inflLbl = document.createElement('span'); inflLbl.className='mob-infl-label';
    inflLbl.textContent = p.stats.INFLUENCE;
    row.appendChild(thumb); row.appendChild(info); row.appendChild(inflLbl);
    row.addEventListener('click',()=>openMobileDetail(p));
    list.appendChild(row);
  });
}

function openMobileDetail(p) {
  mobilePhilo = p;
  document.getElementById('mob-detail').classList.add('open');
  document.getElementById('mob-d-title').textContent = p.nom;
  document.getElementById('mob-d-full').textContent  = p.full;
  document.getElementById('mob-d-dates').textContent = p.dates+' · '+p.lieu;
  document.getElementById('mob-d-oeuvre').textContent= p[lang].oeuvre;
  document.getElementById('mob-d-types').innerHTML   = p.types.map(tp=>`<span class="type-badge ${tClass(tp)}" style="font-size:9px;padding:3px 6px">${tp.toUpperCase()}</span>`).join('');

  const inf = p.stats.INFLUENCE;
  document.getElementById('mob-d-infl-num').textContent = inf;
  const fill = document.getElementById('mob-d-infl');
  fill.style.width = inf+'%';
  fill.className = 'infl-fill '+(inf>=50?'hi':inf>=25?'mid':'low');

  const spriteEl = document.getElementById('mob-d-sprite');
  spriteEl.innerHTML=''; spriteEl.appendChild(placeholderCanvas(120));
  getSprite(p,120).then(c=>{spriteEl.innerHTML='';spriteEl.appendChild(c);});

  // Reset to entry tab
  activeMobileTab = 'entree';
  document.querySelectorAll('.mob-tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector('.mob-tab-btn[data-tab="entree"]').classList.add('active');
  renderTab('entree', p, document.getElementById('mob-tab-body'));
}

// Mobile tab clicks
document.querySelectorAll('.mob-tab-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.mob-tab-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    activeMobileTab = btn.dataset.tab;
    if(mobilePhilo) renderTab(activeMobileTab, mobilePhilo, document.getElementById('mob-tab-body'));
  });
});

// Mobile back button
document.getElementById('mob-back').addEventListener('click',()=>{
  document.getElementById('mob-detail').classList.remove('open');
});

// Mobile search
document.getElementById('mob-search').addEventListener('input',e=>{
  activeSearch=e.target.value;
  renderMobileList();
});

// Mobile lang switch (both header and detail)
function switchLangMobile() {
  lang = lang==='fr'?'en':'fr';
  applyMobileLangLabels();
  buildMobileFilters();
  renderMobileList();
  if(mobilePhilo) openMobileDetail(mobilePhilo);
}
document.getElementById('mob-lang').addEventListener('click', switchLangMobile);
document.getElementById('mob-detail-lang').addEventListener('click', switchLangMobile);

function applyMobileLangLabels() {
  const isEn = lang==='en';
  document.getElementById('mob-lang').textContent = isEn?'FR':'EN';
  document.getElementById('mob-detail-lang').textContent = isEn?'FR':'EN';
  document.getElementById('mob-search').placeholder = t('search');
  document.getElementById('mob-back').textContent   = t('back');
  document.getElementById('mob-tab-entree').textContent    = t('tabEntry');
  document.getElementById('mob-tab-stats').textContent     = t('tabStats');
  document.getElementById('mob-tab-matchups').textContent  = t('tabMatchups');
  document.getElementById('mob-tab-concepts').textContent  = t('tabConcepts');
  document.getElementById('mob-tab-filiation').textContent = t('tabFiliation');
  document.documentElement.lang = lang;
}

// ══════════════════════════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════════════════════════
applyLayout();
</script>
