<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PHILODEX — Pokédex de la Philosophie</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
:root {
  /* Pokédex Red Shell */
  --shell-red:       #DC143C;
  --shell-red-hi:    #FF1744;
  --shell-darkest:   #8B0000;
  --shell-gray:      #2C2C2C;
  
  /* LCD Screen (GBA-like) */
  --lcd-blue-bg:     #1A3A52;
  --lcd-text:        #E0E6FF;
  
  /* Accent */
  --accent:          #00FF41;
  
  /* Utility */
  --bg:              #000;
  --txt-bright:      #FFF;
  --txt-dim:         #AAA;
  
  /* Typography */
  --font-display:    'Press Start 2P', monospace;
  --font-mono:       'Courier New', monospace;
  
  /* Sizes — desktop base */
  --fs-xxs:  9px;
  --fs-xs:  11px;
  --fs-sm:  13px;
  --fs-md:  15px;
  --fs-lg:  18px;
  --fs-xl:  22px;
  --fs-2xl: 28px;

  --radius: 6px;
  --gap:    16px;
}

/* ══ RESET ══ */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; overflow:hidden; }

body {
  background: var(--bg);
  color: var(--txt-bright);
  font-family: var(--font-mono);
  font-size: var(--fs-sm);
  line-height: 1.6;
}

::-webkit-scrollbar { width:5px; }
::-webkit-scrollbar-track { background:var(--lcd-blue-bg); }
::-webkit-scrollbar-thumb { background:var(--accent); border-radius:2px; }

/* ══ DESKTOP LAYOUT (≥1024px) ══ */
#app-desktop {
  display: none;
  height: 100vh;
  flex-direction: column;
}

.desk-header {
  flex-shrink: 0;
  background: var(--shell-red);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 20px;
  box-shadow: 0 3px 0 var(--shell-darkest);
}

.desk-title {
  font-family: var(--font-display);
  font-size: var(--fs-xl);
  letter-spacing: 2px;
}

.lang-btn {
  background: var(--shell-gray);
  color: var(--accent);
  border: 2px solid var(--accent);
  padding: 5px 12px;
  font-family: var(--font-display);
  font-size: var(--fs-xs);
  cursor: pointer;
  border-radius: 3px;
}

.lang-btn:hover { background: var(--accent); color: var(--shell-gray); }

.desk-body {
  display: flex;
  flex: 1;
  gap: var(--gap);
  padding: var(--gap);
  overflow: hidden;
}

/* Era tabs */
.era-tabs {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: var(--gap);
}

.era-tab {
  background: transparent;
  color: var(--txt-dim);
  border: 1px solid var(--txt-dim);
  padding: 6px 12px;
  font-family: var(--font-mono);
  font-size: var(--fs-xs);
  cursor: pointer;
  transition: all 0.2s;
  text-transform: uppercase;
}

.era-tab:hover,
.era-tab.active {
  background: var(--accent);
  color: var(--shell-gray);
  border-color: var(--accent);
}

/* Sidebar */
.desk-sidebar {
  width: 280px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  gap: var(--gap);
  overflow-y: auto;
}

.search-box {
  background: var(--lcd-blue-bg);
  color: var(--txt-bright);
  border: 1px solid var(--accent);
  padding: 8px 12px;
  font-family: var(--font-mono);
  font-size: var(--fs-sm);
}

.search-box::placeholder { color: var(--txt-dim); }

/* Philomon list */
.desk-list {
  flex: 1;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.philomon-row {
  background: var(--lcd-blue-bg);
  border: 1px solid var(--txt-dim);
  padding: 10px;
  cursor: pointer;
  transition: all 0.15s;
  text-transform: uppercase;
  font-size: var(--fs-xs);
}

.philomon-row:hover {
  background: var(--accent);
  color: var(--shell-gray);
  border-color: var(--accent);
}

.philomon-row.active {
  background: var(--accent);
  color: var(--shell-gray);
  border-color: var(--accent);
}

.pr-name { font-weight: bold; }
.pr-meta { font-size: 9px; color: var(--txt-dim); margin-top: 4px; }

/* Detail panel */
.desk-detail {
  width: 400px;
  flex-shrink: 0;
  background: var(--lcd-blue-bg);
  border: 2px solid var(--accent);
  padding: var(--gap);
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: var(--gap);
}

.detail-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid var(--accent);
  padding-bottom: 10px;
}

.detail-title {
  font-family: var(--font-display);
  font-size: var(--fs-lg);
}

.sprite-canvas {
  width: 100%;
  max-width: 200px;
  height: auto;
  background: #000;
  border: 1px solid var(--accent);
  margin: var(--gap) 0;
}

.meta-row {
  display: flex;
  justify-content: space-between;
  font-size: var(--fs-xs);
  padding: 4px 0;
  border-bottom: 1px dotted var(--txt-dim);
}

.tab-buttons {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
}

.tab-btn {
  background: transparent;
  color: var(--txt-dim);
  border: 1px solid var(--txt-dim);
  padding: 4px 8px;
  font-family: var(--font-mono);
  font-size: 10px;
  cursor: pointer;
  transition: all 0.15s;
  text-transform: uppercase;
}

.tab-btn:hover,
.tab-btn.active {
  background: var(--accent);
  color: var(--shell-gray);
  border-color: var(--accent);
}

.tab-content {
  display: none;
  font-size: var(--fs-xs);
  line-height: 1.5;
}

.tab-content.active { display: block; }

/* ══ MOBILE LAYOUT (<1024px) ══ */
#app-mobile {
  display: none;
  height: 100vh;
  flex-direction: column;
}

.mob-header {
  flex-shrink: 0;
  background: var(--shell-red);
  padding: 10px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  box-shadow: 0 2px 0 var(--shell-darkest);
}

.mob-title {
  font-family: var(--font-display);
  font-size: 18px;
  letter-spacing: 1px;
}

.mob-search {
  background: var(--lcd-blue-bg);
  color: var(--txt-bright);
  border: 1px solid var(--accent);
  padding: 8px 12px;
  font-family: var(--font-mono);
  font-size: var(--fs-sm);
  margin: var(--gap);
  width: calc(100% - 2*var(--gap));
}

.mob-era-tabs {
  display: flex;
  gap: 6px;
  padding: 0 var(--gap);
  overflow-x: auto;
  margin-bottom: 8px;
  flex-shrink: 0;
}

.mob-era-tab {
  background: transparent;
  color: var(--txt-dim);
  border: 1px solid var(--txt-dim);
  padding: 5px 10px;
  font-family: var(--font-mono);
  font-size: 10px;
  cursor: pointer;
  white-space: nowrap;
  text-transform: uppercase;
  transition: all 0.2s;
}

.mob-era-tab:hover,
.mob-era-tab.active {
  background: var(--accent);
  color: var(--shell-gray);
  border-color: var(--accent);
}

.mob-list {
  flex: 1;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 6px;
  padding: 0 var(--gap);
}

.mob-item {
  background: var(--lcd-blue-bg);
  border: 1px solid var(--txt-dim);
  padding: 12px;
  cursor: pointer;
  text-transform: uppercase;
  font-size: var(--fs-xs);
  transition: all 0.15s;
}

.mob-item:active {
  background: var(--accent);
  color: var(--shell-gray);
}

.mi-name { font-weight: bold; }
.mi-era { font-size: 9px; color: var(--txt-dim); }

.mob-detail {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.8);
  flex-direction: column;
  z-index: 100;
}

.mob-detail.active {
  display: flex;
}

.mob-detail-inner {
  flex: 1;
  background: var(--lcd-blue-bg);
  margin: 16px;
  border: 2px solid var(--accent);
  display: flex;
  flex-direction: column;
  overflow-y: auto;
}

.mob-detail-header {
  background: var(--shell-red);
  padding: 10px;
  display: flex;
  gap: 8px;
  align-items: center;
  justify-content: space-between;
}

.mob-back-btn {
  background: var(--shell-gray);
  color: var(--accent);
  border: 1px solid var(--accent);
  padding: 4px 8px;
  font-family: var(--font-display);
  font-size: 10px;
  cursor: pointer;
}

.mob-back-btn:active { background: var(--accent); color: var(--shell-gray); }

.mob-detail-content {
  padding: var(--gap);
  display: flex;
  flex-direction: column;
  gap: var(--gap);
  font-size: var(--fs-xs);
}

/* Canvas for pixel art */
canvas {
  image-rendering: pixelated;
  image-rendering: crisp-edges;
}

  </style>
</head>
<body>

<div id="app-desktop">
  <div class="desk-header">
    <div class="desk-title">PHILODEX</div>
    <button class="lang-btn" id="desk-lang">EN</button>

  <div class="mob-detail" id="mob-detail">

    </div>

</div>

      filiation: { masters: ['HEIDEGGER', 'HUSSERL'], disciples: ['CAMUS', 'BEAUVOIR'], against: ['DESCARTES', 'KANT'] }
    },
    en: {
      oeuvre: 'Being and Nothingness',
      entry: 'Existence precedes essence. Man is condemned to freedom and responsible for his choices.',
      concepts: [
        { nom: 'ABSOLUTE FREEDOM', type: 'Existentialisme', puissance: 90, desc: 'Man is the foundation of essence — he creates it through choices.' }
      ],
      filiation: { masters: ['HEIDEGGER', 'HUSSERL'], disciples: ['CAMUS', 'BEAUVOIR'], against: ['DESCARTES', 'KANT'] }
    }
  },
];

// ═══ ERA CONFIGURATION ═══
const ERAS = ['ALL', 'ANTIQUE', 'MEDIEVAL', 'MODERN', 'CRITIQUE', 'CONTEMPORARY'];

// ═══ PIXEL ART ENGINE ═══
function generatePixelArt(canvas, philomon, size = 128) {
  const ctx = canvas.getContext('2d');
  const id = parseInt(philomon.id);
  const gen = philomon.gen;
  
  // Pixelation level inversely proportional to gen (lower gen = more pixelated)
  const pixelSize = Math.max(1, 5 - gen);
  
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  
  // Generate deterministic patterns based on philosopher ID
  const colors = getGenColors(gen);
  for (let y = 0; y < size; y += pixelSize) {
    for (let x = 0; x < size; x += pixelSize) {
      const hash = (id + x/pixelSize + y/pixelSize * 13) % colors.length;
      const idx = Math.floor(Math.abs(Math.sin(hash) * 3)) % colors.length;
      ctx.fillStyle = colors[idx];
      ctx.fillRect(x, y, pixelSize, pixelSize);
    }
  }
}

function getGenColors(gen) {
  if (gen === 1) return ['#000000', '#2D5016', '#558817', '#8FBC8F']; // Gen I (GB, 4-color)
  if (gen === 2) return ['#000000', '#111111', '#333333', '#555555', '#777777', '#999999', '#AAAAAA', '#CCCCCC', '#2D5016', '#558817', '#8FBC8F', '#00AA00', '#00FF00', '#FF6644', '#FFAA88', '#FFFFFF']; // Gen II (GBC)
  if (gen === 3) return ['#000000', '#111111', '#222222', '#333333', '#444444', '#555555', '#666666', '#777777', '#888888', '#999999', '#AAAAAA', '#BBBBBB', '#CCCCCC', '#DDDDDD', '#EEEEEE', '#FFFFFF', '#FF0000', '#00FF00', '#0000FF', '#FFFF00', '#FF00FF', '#00FFFF', '#FF6644', '#66FF44', '#4466FF', '#FF44FF', '#FFFF44', '#44FFFF', '#FF8844', '#88FF44', '#4488FF', '#FF44FF']; // Gen III (GBA, 32-color)
  return ['#000000', '#1A1A1A', '#333333', '#4D4D4D', '#666666', '#808080', '#999999', '#B2B2B2', '#CCCCCC', '#E5E5E5', '#FFFFFF', '#FF0000', '#FF3333', '#FF6666', '#FF9999', '#FFCCCC', '#FF0033', '#FF3366', '#FF6699', '#FF99CC', '#FFCCFF', '#003300', '#006600', '#009900', '#00CC00', '#00FF00', '#33FF33', '#66FF66', '#99FF99', '#CCFFCC', '#FFFFFF', '#000033']; // Gen IV (nearly full color)
}

// ═══ STATE MANAGEMENT ═══
let appState = {
  lang: 'en',
  selectedEra: 'ALL',
  selectedPhilomon: null,
  filteredList: PHILOMON,
};

function setLanguage(lang) {
  appState.lang = lang;
  currentLang = lang;
  document.querySelectorAll('.lang-btn').forEach(btn => btn.textContent = lang.toUpperCase());
  render();
}

function setEra(era) {
  appState.selectedEra = era;
  appState.filteredList = era === 'ALL' ? PHILOMON : PHILOMON.filter(p => p.era === era);
  appState.selectedPhilomon = null;
  render();
}

function selectPhilomon(id) {
  appState.selectedPhilomon = PHILOMON.find(p => p.id === id);
  render();
}

// ═══ RENDERING ═══
function render() {
  const isMobile = window.matchMedia('(max-width: 1023px)').matches;
  if (isMobile) renderMobile();
  else renderDesktop();
}

function renderDesktop() {
  const app = document.getElementById('app-desktop');
  app.style.display = 'flex';
  document.getElementById('app-mobile').style.display = 'none';
  
  // Era tabs
  const eraTabs = document.getElementById('desk-era-tabs');
  eraTabs.innerHTML = '';
  ERAS.forEach(era => {
    const btn = document.createElement('button');
    btn.className = `era-tab ${era === appState.selectedEra ? 'active' : ''}`;
    btn.textContent = t(`eras.${era}`);
    btn.onclick = () => setEra(era);
    eraTabs.appendChild(btn);
  });
  
  // Philomon list
  const list = document.getElementById('desk-list');
  list.innerHTML = '';
  appState.filteredList.forEach(p => {
    const row = document.createElement('div');
    row.className = `philomon-row ${p.id === appState.selectedPhilomon?.id ? 'active' : ''}`;
    row.innerHTML = `<div class="pr-name">${p.nom}</div><div class="pr-meta">${p.dates} • ${t(`eras.${p.era}`)}</div>`;
    row.onclick = () => selectPhilomon(p.id);
    list.appendChild(row);
  });
  
  // Detail panel
  const detail = document.getElementById('desk-detail');
  if (!appState.selectedPhilomon) {
    detail.innerHTML = '<div style="text-align: center; color: var(--txt-dim);">SELECT A PHILOMON</div>';
    return;
  }
  
  const p = appState.selectedPhilomon;
  const data = p[appState.lang] || p.en;
  
  detail.innerHTML = `
    <div class="detail-header">
      <span class="detail-title">${p.nom}</span>
    </div>
  `;
  
  const canvas = document.createElement('canvas');
  canvas.id = 'desk-d-canvas';
  canvas.className = 'sprite-canvas';
  canvas.width = 160;
  canvas.height = 160;
  detail.appendChild(canvas);
  generatePixelArt(canvas, p, 128);
  
  const meta = document.createElement('div');
  meta.innerHTML = `
    <div class="meta-row"><span>${p.full}</span><span>${p.dates}</span></div>
    <div class="meta-row"><span>${p.lieu}</span><span>${data.oeuvre}</span></div>
  `;
  detail.appendChild(meta);
  
  const tabsDiv = document.createElement('div');
  tabsDiv.className = 'tab-buttons';
  const tabs = ['ENTRY', 'STATS', 'CONCEPTS', 'FILIATION'];
  tabs.forEach((tab, idx) => {
    const btn = document.createElement('button');
    btn.className = `tab-btn ${idx === 0 ? 'active' : ''}`;
    btn.textContent = t(`tabs.${tab}`);
    btn.onclick = () => showTab(detail, tab);
    tabsDiv.appendChild(btn);
  });
  detail.appendChild(tabsDiv);
  
  const content = document.createElement('div');
  content.id = 'desk-tab-content';
  content.innerHTML = `<div class="tab-content active">${data.entry}</div>`;
  detail.appendChild(content);
}

function renderMobile() {
  const app = document.getElementById('app-mobile');
  app.style.display = 'flex';
  document.getElementById('app-desktop').style.display = 'none';
  
  // Era tabs
  const eraTabs = document.getElementById('mob-era-tabs');
  eraTabs.innerHTML = '';
  ERAS.forEach(era => {
    const btn = document.createElement('button');
    btn.className = `mob-era-tab ${era === appState.selectedEra ? 'active' : ''}`;
    btn.textContent = t(`eras.${era}`);
    btn.onclick = () => setEra(era);
    eraTabs.appendChild(btn);
  });
  
  // Philomon list
  const list = document.getElementById('mob-list');
  list.innerHTML = '';
  appState.filteredList.forEach(p => {
    const item = document.createElement('div');
    item.className = 'mob-item';
    item.innerHTML = `<div class="mi-name">${p.nom}</div><div class="mi-era">${p.dates}</div>`;
    item.onclick = () => selectPhilomon(p.id);
    list.appendChild(item);
  });
  
  // Detail panel
  const detail = document.getElementById('mob-detail');
  if (!appState.selectedPhilomon) {
    detail.classList.remove('active');
    return;
  }
  
  detail.classList.add('active');
  const p = appState.selectedPhilomon;
  const data = p[appState.lang] || p.en;
  
  document.getElementById('mob-d-title').textContent = p.nom;
  
  const canvas = document.getElementById('mob-d-canvas');
  generatePixelArt(canvas, p, 120);
  
  const meta = document.getElementById('mob-d-meta');
  meta.innerHTML = `
    <div style="font-size: 11px; color: var(--txt-dim);">${p.full} • ${p.dates}</div>
    <div style="font-size: 11px; margin-top: 4px;">${data.oeuvre}</div>
  `;
  
  document.getElementById('mob-d-content').innerHTML = `
    <div style="padding: 8px 0; border-top: 1px solid var(--accent);">${data.entry}</div>
  `;
  
  document.getElementById('mob-back').onclick = () => {
    appState.selectedPhilomon = null;
    render();
  };
}

function showTab(detailPanel, tabName) {
  const p = appState.selectedPhilomon;
  const data = p[appState.lang] || p.en;
  const content = detailPanel.querySelector('#desk-tab-content');
  
  let html = '';
  if (tabName === 'ENTRY') html = data.entry;
  else if (tabName === 'STATS') {
    html = '<div style="display: grid; grid-template-columns: 1fr 1fr; gap: 6px; font-size: 11px;">';
    for (const [stat, val] of Object.entries(p.stats)) {
      html += `<div>${stat}<div style="width:50px; height:6px; background:#333; border: 1px solid var(--accent);"><div style="height:100%; width:${val}%; background:var(--accent);"></div></div>${val}</div>`;
    }
    html += '</div>';
  }
  else if (tabName === 'CONCEPTS') {
    html = data.concepts.map(c => `<div style="margin-bottom:8px; padding-bottom:8px; border-bottom:1px solid var(--txt-dim);"><strong>${c.nom}</strong><br>${c.desc}</div>`).join('');
  }
  else if (tabName === 'FILIATION') {
    html = `<div><strong>Masters:</strong> ${data.filiation.masters.join(', ')}</div><div style="margin-top:6px;"><strong>Disciples:</strong> ${data.filiation.disciples.join(', ')}</div><div style="margin-top:6px;"><strong>Against:</strong> ${data.filiation.against.join(', ')}</div>`;
  }
  
  content.innerHTML = `<div class="tab-content active">${html}</div>`;
  
  // Update active tab button
  detailPanel.querySelectorAll('.tab-btn').forEach((btn, idx) => {
    btn.classList.toggle('active', ['ENTRY', 'STATS', 'CONCEPTS', 'FILIATION'][idx] === tabName);
  });
}

// ═══ EVENT LISTENERS ═══
document.getElementById('desk-lang').addEventListener('click', () => setLanguage(appState.lang === 'en' ? 'fr' : 'en'));
document.getElementById('mob-lang').addEventListener('click', () => setLanguage(appState.lang === 'en' ? 'fr' : 'en'));
document.getElementById('mob-detail-lang').addEventListener('click', () => setLanguage(appState.lang === 'en' ? 'fr' : 'en'));

document.getElementById('desk-search').addEventListener('input', (e) => {
  const search = e.target.value.toLowerCase();
  appState.filteredList = (appState.selectedEra === 'ALL' ? PHILOMON : PHILOMON.filter(p => p.era === appState.selectedEra))
    .filter(p => p.nom.toLowerCase().includes(search) || p.full.toLowerCase().includes(search));
  render();
});

document.getElementById('mob-search').addEventListener('input', (e) => {
  const search = e.target.value.toLowerCase();
  appState.filteredList = (appState.selectedEra === 'ALL' ? PHILOMON : PHILOMON.filter(p => p.era === appState.selectedEra))
    .filter(p => p.nom.toLowerCase().includes(search) || p.full.toLowerCase().includes(search));
  render();
});

window.addEventListener('resize', render);

// ═══ INIT ═══
render();
</script>
